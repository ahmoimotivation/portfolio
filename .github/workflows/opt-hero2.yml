name: opt-hero2
on: push
permissions:
  contents: write
jobs:
  opt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pillow
      - run: python3 -c "from PIL import Image; Image.open('hero-bg.png').convert('RGB').save('hero-bg.jpg', quality=84, optimize=True, progressive=True)"
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git rm -q hero-bg.png .github/workflows/fetch-hero.yml .github/workflows/opt-hero.yml .github/workflows/opt-hero2.yml
          git add hero-bg.jpg
          git commit -m "Optimize hero background and clean up workflows"
          git push
