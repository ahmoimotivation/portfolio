name: restyle-slides
on: push
permissions:
  contents: write
jobs:
  f:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pillow
      - run: |
          curl -sL "https://d8j0ntlcm91z4.cloudfront.net/user_3EhwCYnKpldNf6ZgKnn8NydXpSL/hf_20260702_072150_ad93cf98-907b-404e-af53-f66a3f4f4052.png" -o slides/raw3.png
          curl -sL "https://d8j0ntlcm91z4.cloudfront.net/user_3EhwCYnKpldNf6ZgKnn8NydXpSL/hf_20260702_072152_0461746a-f463-44e2-8cef-f9a17aa7835f.png" -o slides/raw5.png
          curl -sL "https://d8j0ntlcm91z4.cloudfront.net/user_3EhwCYnKpldNf6ZgKnn8NydXpSL/hf_20260702_072156_c383a76f-e638-4cdc-a59d-de95ed4734f7.png" -o slides/raw6.png
          curl -sL "https://d8j0ntlcm91z4.cloudfront.net/user_3EhwCYnKpldNf6ZgKnn8NydXpSL/hf_20260702_072159_070cf25d-d418-468f-ba3c-58e0e36181c2.png" -o slides/raw7.png
      - run: |
          python3 << 'PYEOF'
          from PIL import Image
          for n in (3, 5, 6, 7):
              im = Image.open("slides/raw%d.png" % n).convert("RGB")
              im.save("slides/case-%d.jpg" % n, quality=84, optimize=True, progressive=True)
          PYEOF
      - run: |
          rm slides/raw*.png
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add slides
          git rm -q .github/workflows/restyle-slides.yml
          git commit -m "Restyle case study slides with Higgsfield"
          git push
