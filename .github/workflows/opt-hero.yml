name: opt-hero
on: push
permissions:
  contents: write
jobs:
  opt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: convert hero-bg.png -quality 84 hero-bg.jpg
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git rm -q hero-bg.png .github/workflows/fetch-hero.yml .github/workflows/opt-hero.yml
          git add hero-bg.jpg
          git commit -m "Optimize hero background and clean up workflows"
          git push
